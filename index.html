<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <title>QR THIS — Instant QR Code Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta name="description" content="Generate a QR code from any link. No tracking. No backend. Your link never leaves your device." />

<meta property="og:title" content="QR THIS" />
<meta property="og:description" content="Instant QR generator. Private, fast, and simple." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://qr-this.com" />
<meta property="og:image" content="https://qr-this.com/favicon.png" />

  
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="QR THIS" />

  
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .app {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
    }

    #qrcode {
      margin: 20px auto;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      width: fit-content;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 16px;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>QR THIS</h1>
    <p>Your link never leaves your device</p>

    <input
      type="url"
      id="urlInput"
      placeholder="Paste a link here"
      autofocus
    />

    <div id="qrcode"></div>

    <button id="downloadBtn" style="display:none;">
      Download PNG
    </button>

    <footer>
      No tracking. No backend. No bullshit.
    </footer>
  </div>

  <!-- QRCode library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
    const input = document.getElementById('urlInput');
    const qrContainer = document.getElementById('qrcode');
    const downloadBtn = document.getElementById('downloadBtn');
    let qr;

    input.addEventListener('input', () => {
      const value = input.value.trim();

      qrContainer.innerHTML = '';
      downloadBtn.style.display = 'none';

      if (!value) return;

      qr = new QRCode(qrContainer, {
        text: value,
        width: 256,
        height: 256,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });

      setTimeout(() => {
        downloadBtn.style.display = 'inline-block';
      }, 100);
    });

    downloadBtn.addEventListener('click', () => {
      const img = qrContainer.querySelector('img');
      if (!img) return;

      const a = document.createElement('a');
      a.href = img.src;
      a.download = 'qr.png';
      a.click();
    });
  </script>

</body>
</html>
